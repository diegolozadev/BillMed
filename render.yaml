services:
  - type: web
    name: inopay
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn InoPay_project.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inopay-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.12.3
    autoDeploy: true

databases:
  - name: inopay-db
    databaseName: inopay
    plan: free
